slang = en,eng,ja,jap,unknown

sub-font='Roboto' 
sub-font-size=45   
sub-bold=no

sub-color='#FFDCDCDC'
sub-border-color='#FF0F0F0F'  
sub-border-size=3.0            
sub-shadow-color='#FF0F0F0F'  
sub-shadow-offset=4.0          

sub-margin-x=25                
sub-margin-y=22                

sub-fix-timing=yes
sub-auto=fuzzy                 # all || exact || fuzzy  
sub-file-paths-append=subs
