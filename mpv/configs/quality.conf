gpu-api=d3d11                                       # for Intel integrated GPUs
glsl-shaders="~~/shaders/FSRCNNX_x2_8-0-4-1.glsl"   # a neural network-based upscaler. It boosts the resolution of your video by 2x
vo=gpu-next                                         # Vaapi crashes my VivoBook X415EA ;(
hwdec=no                                            # "no" is required for vf=sub to work

scale=bilinear                                      # General video upscaling filter
cscale=bilinear                                     # Chroma (color) upscaling filter
dscale=mitchell                                     # Video downscaling filter

dither-depth=8
