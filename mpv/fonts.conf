<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  
  <dir>./fonts</dir>
  
  <!-- ## Map Gandhi Sans fonts -->
  <match target="pattern">
    <test qual="any" name="family"><string>Gandhi Sans</string></test>
    <edit name="family" mode="assign">
      <string>GandhiSans-Regular</string>
    </edit>
  </match>

  <match target="pattern">
    <test qual="any" name="family"><string>GandhiSans-Regular</string></test>
    <test name="slant" compare="eq"><const>italic</const></test>
    <edit name="family" mode="assign">
      <string>GandhiSans-Italic</string>
    </edit>
  </match>

  <match target="pattern">
    <test qual="any" name="family"><string>GandhiSans-Regular</string></test>
    <test name="weight" compare="eq"><const>bold</const></test>
    <edit name="family" mode="assign">
      <string>GandhiSans-Bold</string>
    </edit>
  </match>

  <match target="pattern">
    <test qual="any" name="family"><string>GandhiSans-Regular</string></test>
    <test name="slant" compare="eq"><const>italic</const></test>
    <test name="weight" compare="eq"><const>bold</const></test>
    <edit name="family" mode="assign">
      <string>GandhiSans-BoldItalic</string>
    </edit>
  </match>

  <!-- ## Map Liberation Sans fonts -->
  <match target="pattern">
    <test qual="any" name="family"><string>Liberation Sans</string></test>
    <edit name="family" mode="assign">
      <string>LiberationSans-Regular</string>
    </edit>
  </match>

  <match target="pattern">
    <test qual="any" name="family"><string>LiberationSans-Regular</string></test>
    <test name="slant" compare="eq"><const>italic</const></test>
    <edit name="family" mode="assign">
      <string>LiberationSans-Italic</string>
    </edit>
  </match>

  <match target="pattern">
    <test qual="any" name="family"><string>LiberationSans-Regular</string></test>
    <test name="weight" compare="eq"><const>bold</const></test>
    <edit name="family" mode="assign">
      <string>LiberationSans-Bold</string>
    </edit>
  </match>

  <match target="pattern">
    <test qual="any" name="family"><string>LiberationSans-Regular</string></test>
    <test name="slant" compare="eq"><const>italic</const></test>
    <test name="weight" compare="eq"><const>bold</const></test>
    <edit name="family" mode="assign">
      <string>LiberationSans-BoldItalic</string>
    </edit>
  </match>

</fontconfig>
